<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:sans-serif;background:#0f0f0f;color:#fff;overflow-x:hidden;}
img{max-width:100%;height:auto}

/* NAV */
#navbar{
position:fixed;
top:0;
left:0;
right:0;
padding:20px 60px;
display:flex;
justify-content:space-between;
background:#111;
z-index:100;
}

.nav-logo{font-size:1.5rem;font-weight:bold;}
.nav-links{display:flex;gap:20px;list-style:none;}
.nav-links a{color:#aaa;text-decoration:none}

/* HERO */
#hero{
min-height:100vh;
display:flex;
align-items:center;
padding:120px 60px;
}

.hero-name{font-size:5rem;font-weight:bold;}
.hero-role{color:#aaa;margin-top:10px}

/* BUTTON */
.btn{
padding:12px 20px;
background:#e63946;
color:#fff;
border:none;
margin-top:20px;
cursor:pointer;
}

/* GRID */
.projects-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:60px;
}

/* MOBILE + TABLET FIX 🔥 */
@media (max-width:1024px){
.hero-name{font-size:3rem}
.projects-grid{grid-template-columns:repeat(2,1fr)}
}

@media (max-width:600px){

#navbar{
padding:12px 15px;
}

.nav-links{
display:none;
}

#hero{
padding:90px 15px;
}

.hero-name{
font-size:2.2rem;
line-height:1.2;
}

.hero-role{
font-size:0.9rem;
}

.btn{
width:100%;
}

.projects-grid{
grid-template-columns:1fr;
padding:20px;
}

}

/* TOUCH FIX */
button,a{min-height:42px}

/* CURSOR DISABLE MOBILE */
@media (max-width:768px){
.cursor,.cursor-f{display:none}
}
</style>

</head>
<body>

<nav id="navbar">
<div class="nav-logo">Port<span style="color:red">.</span></div>
<ul class="nav-links">
<li><a href="#">About</a></li>
<li><a href="#">Projects</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

<section id="hero">
<div>
<h1 class="hero-name">Your Name</h1>
<p class="hero-role">Designer & Developer</p>
<button class="btn">View Projects</button>
</div>
</section>

<section class="projects-grid">
<div style="background:#222;padding:20px;border-radius:10px;">Project 1</div>
<div style="background:#222;padding:20px;border-radius:10px;">Project 2</div>
<div style="background:#222;padding:20px;border-radius:10px;">Project 3</div>
</section>

</body>
</html>
